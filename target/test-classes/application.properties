spring.config.import=optional:file:.env[.properties]

spring.datasource.url=jdbc:h2:mem:smartats;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

app.ai.gemini.enabled=true
app.ai.gemini.api-key=test-gemini-key
app.ai.gemini.model=gemini-2.5-flash
app.ai.gemini.base-url=https://generativelanguage.googleapis.com
app.ai.gemini.max-retries=1
app.ai.gemini.retry-delay-millis=50
app.ai.gemini.queue-spacing-millis=0
app.ai.gemini.rate-limit-cooldown-millis=50
app.ai.gemini.max-backoff-millis=100

app.ai.openrouter.enabled=true
app.ai.openrouter.api-key=test-openrouter-key
app.ai.openrouter.primary-model=deepseek/deepseek-chat-v3-0324:free
app.ai.openrouter.secondary-model=qwen/qwen-2.5-72b-instruct:free
app.ai.openrouter.runtime-fallback-models[0]=deepseek/deepseek-v4-flash:free
app.ai.openrouter.runtime-fallback-models[1]=qwen/qwen3-next-80b-a3b-instruct:free
app.ai.openrouter.runtime-fallback-models[2]=qwen/qwen3-coder:free
app.ai.openrouter.http-referer=http://localhost:8080
app.ai.openrouter.title=SmartATS
app.ai.openrouter.max-retries=1
app.ai.openrouter.retry-delay-millis=50
app.ai.openrouter.queue-spacing-millis=0
app.ai.openrouter.rate-limit-cooldown-millis=50
app.ai.openrouter.max-backoff-millis=100

spring.mail.host=localhost
spring.mail.port=2525
spring.flyway.enabled=false
