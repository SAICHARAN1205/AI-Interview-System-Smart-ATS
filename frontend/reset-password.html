<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | AI Hiring Platform</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/landing.css">
    <style>
        .message-box {
            display: none;
            margin-top: 1rem;
            padding: 0.9rem 1rem;
            border-radius: 12px;
            font-weight: 600;
            text-align: left;
        }

        .message-box.show {
            display: block;
        }

        .message-box.success {
            background: rgba(21, 128, 61, 0.12);
            color: #166534;
            border: 1px solid rgba(21, 128, 61, 0.2);
        }

        .message-box.error {
            background: rgba(220, 38, 38, 0.12);
            color: #b91c1c;
            border: 1px solid rgba(220, 38, 38, 0.2);
        }

        .btn[disabled] {
            opacity: 0.75;
            cursor: wait;
            transform: none;
        }

        .step-container {
            display: none;
        }

        .step-container.active {
            display: block;
        }

        .password-requirements {
            font-size: 0.85rem;
            margin-top: 0.5rem;
            color: var(--text-secondary);
        }

        .password-requirements ul {
            list-style: none;
            padding-left: 0;
            margin: 0.25rem 0 0 0;
        }

        .password-requirements li {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            margin-bottom: 0.2rem;
        }

        .password-requirements li::before {
            content: "✖";
            color: #b91c1c;
            font-size: 0.8rem;
        }

        .password-requirements li.valid::before {
            content: "✔";
            color: #166534;
        }

    </style>
    <script src="js/api.js" defer></script>
    <script src="js/ui.js" defer></script>
    <script src="js/navbar.js" defer></script>
    <script src="js/reset-password.js" defer></script>
</head>
<body data-nav-current="login">
    <div class="page-wrapper">
        <header data-navbar-root></header>

        <main class="center-layout">
            <section class="form-card">
                <p class="badge">Security</p>
                <h1 id="reset-title">Verify Reset Code</h1>
                <p id="reset-subtitle" class="form-text">Enter the 6-digit code sent to <strong id="reset-email-display">your email</strong>.</p>

                <!-- STEP 1: Verify OTP -->
                <form id="verify-otp-form" class="form-layout step-container active" style="margin-top: 2rem;">
                    <label class="field">
                        <span>6-Digit Reset Code</span>
                        <input type="text" id="reset-otp" name="otp" placeholder="123456" maxlength="6" required autofocus>
                    </label>

                    <div id="verify-message" class="message-box" role="status" aria-live="polite"></div>

                    <button type="submit" id="verify-button" class="btn btn-primary btn-full" style="margin-top: 1rem;">Verify Code</button>
                    
                    <div style="text-align: center; margin-top: 1rem;">
                        <a href="login.html" style="color: var(--text-secondary); text-decoration: none; font-size: 0.9rem;">Back to Login</a>
                    </div>
                </form>

                <!-- STEP 2: New Password (Hidden initially) -->
                <form id="new-password-form" class="form-layout step-container" style="margin-top: 2rem;">
                    <div class="field">
                        <label for="reset-new-password"><span>New Password</span></label>
                        <div class="password-input-wrapper">
                            <input type="password" id="reset-new-password" name="newPassword" placeholder="Create new password" required>
                            <button type="button" class="password-toggle" aria-label="Show password">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-eye"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                            </button>
                        </div>
                        <div class="password-strength-container" id="password-strength-container" style="display: none;">
                            <div class="strength-bar-wrapper">
                                <div class="strength-bar" id="strength-bar-fill"></div>
                            </div>
                            <span id="strength-text" class="strength-text">Weak</span>
                        </div>
                        <div class="password-requirements">
                            Password must contain:
                            <ul id="password-policy-list">
                                <li id="req-length">Minimum 8 characters</li>
                                <li id="req-upper">One uppercase letter</li>
                                <li id="req-lower">One lowercase letter</li>
                                <li id="req-number">One number</li>
                                <li id="req-special">One special character (e.g. _, @, #)</li>
                            </ul>
                        </div>
                    </div>

                    <div class="field" style="margin-top: 1rem;">
                        <label for="reset-confirm-password"><span>Confirm New Password</span></label>
                        <div class="password-input-wrapper">
                            <input type="password" id="reset-confirm-password" name="confirmPassword" placeholder="Confirm your new password" required>
                            <button type="button" class="password-toggle" aria-label="Show password">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-eye"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                            </button>
                        </div>
                        <div id="match-indicator" class="match-indicator"></div>
                    </div>

                    <div id="reset-message" class="message-box" role="status" aria-live="polite"></div>

                    <button type="submit" id="reset-button" class="btn btn-primary btn-full" style="margin-top: 1rem;">Reset Password</button>
                </form>

            </section>
        </main>
    </div>
</body>
</html>
