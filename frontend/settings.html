<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Settings | AI Hiring Platform</title>
    <meta name="description" content="Manage your profile, password, and preferences.">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/landing.css">
    <style>
        /* Component specific styles removed as they are now global in style.css */
    </style>
    <script src="js/api.js" defer></script>
    <script src="js/ui.js" defer></script>
    <script src="js/navbar.js" defer></script>
    <script src="js/auth.js" defer></script>
    <script src="js/settings.js" defer></script>
</head>
<body class="ln-profile-page" data-page="settings" data-nav-current="settings">
    <header data-navbar-root></header>

    <main class="ln-page-wrap">
        <div class="ln-profile-card">
            <div class="ln-profile-header">
                <div class="ln-profile-avatar" id="profile-avatar">U</div>
                <div class="ln-profile-info">
                    <h1 id="profile-display-name">Account Settings</h1>
                    <p id="profile-role-badge" class="subtle-text">Manage your profile, security, and preferences.</p>
                </div>
            </div>

            <div id="settings-message" class="ln-msg"></div>

            <form id="settings-form">
                <div class="ln-form-grid">
                    <div class="ln-field full">
                        <h3>Profile Information</h3>
                    </div>
                    <div class="ln-field">
                        <label for="profile-name">Name</label>
                        <input type="text" id="profile-name" placeholder="Your full name">
                    </div>
                    <div class="ln-field">
                        <label for="profile-email">Email</label>
                        <input type="email" id="profile-email" readonly>
                    </div>

                    <!-- CANDIDATE SPECIFIC FIELDS -->
                    <div id="candidate-fields" style="display: none; width: 100%; grid-column: 1 / -1;">
                        <div class="ln-form-grid" style="margin-top: 1rem;">
                            <div class="ln-field">
                                <label for="profile-phone">Phone Number</label>
                                <input type="tel" id="profile-phone" placeholder="+91 9876543210">
                            </div>
                            <div class="ln-field">
                                <label for="profile-skills">Skills</label>
                                <input type="text" id="profile-skills" placeholder="Java, Python, React">
                            </div>
                            <div class="ln-field full">
                                <label for="profile-bio">Bio</label>
                                <textarea id="profile-bio" rows="4" placeholder="Tell us about yourself..."></textarea>
                            </div>
                            <div class="ln-field full">
                                <label for="profile-education">Education</label>
                                <textarea id="profile-education" rows="2" placeholder="Your degrees..."></textarea>
                            </div>
                            <div class="ln-field full">
                                <label for="profile-projects">Projects</label>
                                <textarea id="profile-projects" rows="2" placeholder="Projects you've built..."></textarea>
                            </div>
                            <div class="ln-field full" id="resume-upload-container">
                                <label for="profile-resume">Resume</label>
                                <div id="resume-display-area" style="display:none;align-items:center;gap:1rem;margin-bottom:1rem;padding:1rem;border:1px solid var(--c-border);border-radius:var(--radius-lg);background:var(--c-surface-alt);">
                                    <div style="font-size:2rem;">Resume</div>
                                    <div style="flex-grow:1;">
                                        <strong id="resume-file-name" style="display:block;margin-bottom:0.25rem;"></strong>
                                        <small id="resume-status-text" style="color:var(--c-muted);">Uploaded successfully</small>
                                    </div>
                                    <div style="display:flex;gap:0.5rem;">
                                        <button type="button" id="btn-view-resume" class="ln-btn ln-btn-outline" style="padding:0.4rem 0.8rem;font-size:0.85rem;">View</button>
                                        <button type="button" id="btn-download-resume" class="ln-btn ln-btn-primary" style="padding:0.4rem 0.8rem;font-size:0.85rem;">Download</button>
                                    </div>
                                </div>
                                <small id="resume-empty-state" style="display:block;color:var(--c-muted);margin-bottom:0.75rem;">Resume not uploaded</small>
                                <label id="resume-upload-label" for="profile-resume">Upload / Replace Resume</label>
                                <input type="file" id="profile-resume" accept=".pdf,.doc,.docx">
                            </div>
                        </div>
                    </div>

                    <!-- RECRUITER SPECIFIC FIELDS -->
                    <div id="recruiter-fields" style="display: none; width: 100%; grid-column: 1 / -1;">
                        <div class="ln-form-grid" style="margin-top: 1rem;">
                            <div class="ln-field">
                                <label for="recruiter-company">Company Name</label>
                                <input type="text" id="recruiter-company" placeholder="e.g. Acme Corp">
                            </div>
                            <div class="ln-field">
                                <label for="recruiter-designation">Designation</label>
                                <input type="text" id="recruiter-designation" placeholder="e.g. Senior Tech Recruiter">
                            </div>
                            <div class="ln-field">
                                <label for="recruiter-website">Company Website</label>
                                <input type="url" id="recruiter-website" placeholder="https://example.com">
                            </div>
                            <div class="ln-field">
                                <label for="recruiter-linkedin">LinkedIn Profile</label>
                                <input type="url" id="recruiter-linkedin" placeholder="https://linkedin.com/in/...">
                            </div>
                            <div class="ln-field">
                                <label for="recruiter-department">Hiring Department</label>
                                <input type="text" id="recruiter-department" placeholder="e.g. Engineering">
                            </div>
                            <div class="ln-field">
                                <label for="recruiter-contact">Contact Number</label>
                                <input type="tel" id="recruiter-contact" placeholder="+91 9876543210">
                            </div>
                            <div class="ln-field full">
                                <label for="recruiter-location">Company Location</label>
                                <input type="text" id="recruiter-location" placeholder="e.g. San Francisco, CA">
                            </div>
                            <div class="ln-field full">
                                <label for="recruiter-description">Company Description</label>
                                <textarea id="recruiter-description" rows="4" placeholder="About the company..."></textarea>
                            </div>
                        </div>
                    </div>

                    <div class="ln-field full" style="margin-top:1rem;">
                        <h3>Change Password</h3>
                    </div>
                    <div class="ln-field">
                        <label for="settings-current-password">Current Password</label>
                        <div class="password-input-wrapper">
                            <input type="password" id="settings-current-password" placeholder="Enter current password">
                            <button type="button" class="password-toggle" aria-label="Show password" title="Show password">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-eye"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                            </button>
                        </div>
                    </div>
                    <div class="ln-field"></div>
                    <div class="ln-field">
                        <label for="settings-new-password">New Password</label>
                        <div class="password-input-wrapper">
                            <input type="password" id="settings-new-password" placeholder="Enter new password">
                            <button type="button" class="password-toggle" aria-label="Show password" title="Show password">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-eye"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                            </button>
                        </div>
                    </div>
                    <div class="ln-field">
                        <label for="settings-confirm-password">Confirm Password</label>
                        <div class="password-input-wrapper">
                            <input type="password" id="settings-confirm-password" placeholder="Confirm new password">
                            <button type="button" class="password-toggle" aria-label="Show password" title="Show password">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-eye"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                            </button>
                        </div>
                    </div>

                    <div class="ln-field full" style="margin-top:1rem;">
                        <h3>Preferences</h3>
                    </div>
                    <div class="ln-field full">
                        <label class="field" style="flex-direction:row;align-items:center;gap:0.5rem;cursor:pointer;">
                            <input type="checkbox" id="settings-dark-mode">
                            <span style="font-weight:700;">Enable Dark Mode</span>
                        </label>
                    </div>
                    <div class="ln-field full">
                        <label class="field" style="flex-direction:row;align-items:center;gap:0.5rem;cursor:pointer;">
                            <input type="checkbox" id="settings-email-notifications" checked>
                            <span>Receive email notifications for application updates</span>
                        </label>
                    </div>
                    <div class="ln-field full">
                        <label class="field" style="flex-direction:row;align-items:center;gap:0.5rem;cursor:pointer;">
                            <input type="checkbox" id="settings-marketing-emails">
                            <span>Receive marketing and promotional emails</span>
                        </label>
                    </div>
                </div>

                <div class="ln-profile-actions" style="margin-top:2rem;">
                    <button type="submit" class="ln-btn ln-btn-primary" id="settings-save-btn">Save Settings</button>
                    <a href="dashboard.html" class="ln-btn ln-btn-outline" id="settings-back-btn">Back to Candidate Dashboard</a>
                </div>
            </form>
        </div>
    </main>
</body>
</html>
