<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | AI Hiring Platform</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/landing.css">
    <style>
        .message-box {
            display: none;
            margin-top: 1rem;
            padding: 0.9rem 1rem;
            border-radius: 12px;
            font-weight: 600;
            text-align: left;
        }
        .message-box.show { display: block; }
        .message-box.success { background: rgba(21, 128, 61, 0.12); color: #166534; border: 1px solid rgba(21, 128, 61, 0.2); }
        .message-box.error { background: rgba(220, 38, 38, 0.12); color: #b91c1c; border: 1px solid rgba(220, 38, 38, 0.2); }
        .btn[disabled] { opacity: 0.75; cursor: wait; transform: none; }
    </style>
    <script src="js/api.js" defer></script>
    <script src="js/ui.js" defer></script>
    <script src="js/navbar.js" defer></script>
    <script src="js/forgot-password.js" defer></script>
</head>
<body data-nav-current="login">
    <div class="page-wrapper">
        <header data-navbar-root></header>
        <main class="center-layout">
            <section class="form-card">
                <p class="badge">Security</p>
                <h1>Reset Password</h1>
                <p class="form-text">Enter your email address and we'll send you a code to reset your password.</p>

                <form id="forgot-password-form" class="form-layout" style="margin-top: 2rem;">
                    <label class="field">
                        <span>Email</span>
                        <input type="email" id="forgot-email" name="email" placeholder="you@example.com" required autofocus>
                    </label>

                    <div id="forgot-message" class="message-box" role="status" aria-live="polite"></div>

                    <button type="submit" id="forgot-button" class="btn btn-primary btn-full">Send Reset Code</button>
                    
                    <div style="text-align: center; margin-top: 1rem;">
                        <a href="login.html" style="color: var(--text-secondary); text-decoration: none; font-size: 0.9rem;">Back to Login</a>
                    </div>
                </form>
            </section>
        </main>
    </div>
</body>
</html>
